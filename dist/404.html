<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Stranica nije pronađena | StudyBuddy</title>
  <meta name="description" content="Tražena stranica ne postoji. Vrati se na StudyBuddy i nastavi učiti." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090f;
      --surface:  #111118;
      --border:   rgba(255,255,255,0.08);
      --violet:   #7c3aed;
      --violet2:  #a78bfa;
      --cyan:     #22d3ee;
      --text:     #f1f5f9;
      --text2:    #94a3b8;
      --text3:    #475569;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Animated background ── */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 520px; height: 520px; background: var(--violet); top: -160px; left: -120px; animation-duration: 14s; }
    .blob-2 { width: 420px; height: 420px; background: var(--cyan);   bottom: -140px; right: -100px; animation-duration: 11s; animation-delay: -5s; }
    .blob-3 { width: 280px; height: 280px; background: #ec4899;       top: 40%; left: 50%; animation-duration: 16s; animation-delay: -3s; opacity: 0.10; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Grid overlay ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    }

    /* ── Main content ── */
    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }

    /* ── Glowing 404 number ── */
    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--violet2) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 48px rgba(124,58,237,0.45));
      animation: pulse-glow 3s ease-in-out infinite;
      user-select: none;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 32px rgba(124,58,237,0.4)); }
      50%       { filter: drop-shadow(0 0 64px rgba(34,211,238,0.55)); }
    }

    /* ── Floating icon ── */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .icon-wrap svg { color: var(--violet2); }

    /* ── Text ── */
    h1 {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 700;
      color: var(--text);
      margin: 0.75rem 0 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text2);
      max-width: 380px;
      line-height: 1.65;
      margin: 0 auto 2rem;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      max-width: 460px;
      width: 100%;
      margin-bottom: 2rem;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--violet), #6d28d9);
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,58,237,0.55);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--text2);
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }

    /* ── Brand badge ── */
    .brand {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.0625rem;
      color: var(--text2);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .brand span { color: var(--violet2); }

    /* ── Hint links ── */
    .hint {
      font-size: 0.8125rem;
      color: var(--text3);
      margin-top: 1.5rem;
    }
    .hint a {
      color: var(--violet2);
      text-decoration: none;
      font-weight: 500;
    }
    .hint a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem; }
      .btn-row { flex-direction: column; align-items: stretch; }
      .btn-primary, .btn-ghost { justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <!-- Brand -->
  <a href="/" class="brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    Study<span>Buddy</span>
  </a>

  <!-- Main -->
  <div class="wrapper">
    <div class="error-code">404</div>

    <div class="card">
      <div class="icon-wrap">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="11"/>
          <line x1="11" y1="14" x2="11.01" y2="14"/>
        </svg>
      </div>

      <h1>Stranica nije pronađena</h1>
      <p class="subtitle">Ova stranica ne postoji ili je premještena. Provjeri URL ili se vrati na početnu stranicu.</p>

      <div class="btn-row">
        <a href="/" class="btn-primary">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Početna stranica
        </a>
        <a href="/notes" class="btn-ghost">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Bilješke
        </a>
      </div>

      <p class="hint">
        Tražiš nešto konkretno? Idi na
        <a href="/flashcards">Flashcards</a> ili
        <a href="/leaderboard">Ljestvicu</a>.
      </p>
    </div>
  </div>

</body>
</html>
